<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/_shared.css">
<!-- Open Graph — change og:image to a real JPG/PNG URL for best social sharing -->
<!-- To update: replace /og-image.svg with your image URL in the line below -->
<meta property="og:type" content="website">
<meta property="og:title" content="Events">
<meta property="og:description" content="">
<meta property="og:image" content="/og-image.svg">
<meta property="og:url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Events">
<meta name="twitter:description" content="">
<meta name="twitter:image" content="/og-image.svg">
<script defer src="/_vercel/insights/script.js"></script>
<style>
/* ── INDEX-SPECIFIC: CTA section ── */
.cta-section {
  text-align: center;
  padding: 2rem 1.5rem 3rem;
}
.cta-btn {
  display: inline-flex; align-items: center; gap: 0.5rem;
  font-family: var(--sans); font-size: 0.9rem;
  color: var(--accent2); text-decoration: none;
  border: 1px solid rgba(196,164,74,0.4); border-radius: 100px;
  padding: 0.6rem 1.4rem;
  transition: all 0.2s;
}
.cta-btn:hover { background: rgba(196,164,74,0.08); border-color: var(--accent2); }

/* index shows max 3 events stacked — no catalog grid needed */
.mode-single .event-single { max-width: 680px; margin: 2.5rem auto; padding: 0 1.5rem; }
.mode-single .event-single + .event-single { margin-top: 0; padding-top: 2.5rem; border-top: 1px solid var(--border); }

/* ── COLLAPSIBLE DESCRIPTION ── */
.desc-preview { font-size: 1.05rem; line-height: 1.75; color: var(--text2); white-space: pre-line; }
.desc-full { font-size: 1.05rem; line-height: 1.75; color: var(--text2); white-space: pre-line; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="/" class="site-nav-logo">✦ <span id="nav-title">Events</span></a>
    <div class="site-nav-links">
      <a href="/" class="nav-link">Domov</a>
      <a href="/events.html" class="nav-link">Dogodki</a>
      <a href="/team.html" class="nav-link">Ekipa</a>
      <a href="/admin.html" class="nav-admin" title="Admin">⬡</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <header class="site-header">
    <span class="header-star">✦ ✦ ✦</span>
    <h1 id="site-title">Events</h1>
    <p id="site-subtitle"></p>
  </header>

  <!-- Hero -->
  <div class="hero-section" id="hero-section" style="display:none">
    <div class="hero-inner"><p id="hero-text"></p></div>
  </div>

  <!-- Upcoming events (max 3) -->
  <div id="main" class="mode-single">
    <!-- skeleton -->
    <div class="event-single" id="skeleton-wrap">
      <div class="skel" style="width:100%;aspect-ratio:16/9;border-radius:14px;margin-bottom:2rem"></div>
      <div class="skel" style="height:14px;width:50%;margin-bottom:1.5rem;border-radius:4px"></div>
      <div class="skel" style="height:28px;width:80%;margin-bottom:1.2rem;border-radius:4px"></div>
      <div class="skel" style="height:12px;width:100%;margin-bottom:8px;border-radius:4px"></div>
      <div class="skel" style="height:12px;width:75%;border-radius:4px"></div>
    </div>
  </div>

  <!-- CTA to all events -->
  <div class="cta-section" id="cta-more" style="display:none">
    <a href="/events.html" class="cta-btn">Prikaži vse dogodke →</a>
  </div>

  <footer class="site-footer"><p id="footer-text"></p></footer>
</div>

<button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Na vrh">↑</button>

<div class="subscribe-bar" id="subscribe-bar">
  <form class="subscribe-bar-inner" id="subscribe-form" onsubmit="handleSubscribe(event, collectName)">
    <div class="bar-msg" id="sub-msg-bar" style="display:none"></div>
    <input type="text" class="sub-name name-field" placeholder="Ime">
    <input type="email" class="sub-email" placeholder="E-mail za vabila na dogodke" required autocomplete="email">
    <button type="submit">Prijavi se</button>
  </form>
</div>

<script src="/_shared.js"></script>
<script>
const PREVIEW_LENGTH = 3; // max upcoming events on homepage
let collectName = false;

const GLOBE_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-1px;margin-right:3px"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

function toggleDesc(btn, previewId, fullId) {
  const isOpen = btn.classList.contains('open');
  const preview = document.getElementById(previewId);
  const full = document.getElementById(fullId);
  btn.classList.toggle('open', !isOpen);
  btn.querySelector('.chevron').textContent = isOpen ? '▾' : '▴';
  btn.querySelector('.btn-label').textContent = isOpen ? 'Preberi več' : 'Skrij';
  preview.style.display = isOpen ? '' : 'none';
  full.classList.toggle('open', !isOpen);
}

function toggleSpeakers(btn, bodyId) {
  const isOpen = btn.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  btn.querySelector('.chevron').textContent = isOpen ? '▾' : '▴';
  btn.querySelector('.btn-label').textContent = isOpen ? 'Predavatelji' : 'Skrij';
  document.getElementById(bodyId).classList.toggle('open', !isOpen);
}

function speakerListHtml(speakers, bodyId) {
  if (!speakers.length) return '';
  const html = speakers.map(s => `
    <div style="display:flex;gap:0.8rem;align-items:flex-start;margin-bottom:1rem">
      ${s.imageUrl ? `<img src="${s.imageUrl}" alt="${s.name}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--border)" onerror="this.style.display='none'">` : ''}
      <div>
        <div style="font-size:0.92rem;color:var(--text)">${s.name}</div>
        ${s.role ? `<div style="font-size:0.76rem;color:var(--accent2);font-family:var(--sans)">${s.role}</div>` : ''}
        ${s.bio ? `<p style="font-size:0.84rem;color:var(--text2);line-height:1.6;margin:0.3rem 0 0">${s.bio}</p>` : ''}
        ${s.link ? `<a href="${s.link}" target="_blank" rel="noopener" style="font-size:0.8rem;color:var(--accent);text-decoration:none;font-family:var(--sans);display:inline-flex;align-items:center;gap:2px;margin-top:0.3rem">${GLOBE_ICON}Spletna stran</a>` : ''}
      </div>
    </div>`).join('');
  const uid = Math.random().toString(36).slice(2,7);
  const bid = bodyId || ('sp-' + uid);
  return `
    <button class="collapsible-trigger" onclick="toggleSpeakers(this,'${bid}')">
      <span class="btn-label">Predavatelji</span><span class="chevron">▾</span>
    </button>
    <div class="collapsible-body" id="${bid}">${html}</div>`;
}

function eventHtml(ev, idx) {
  const speakers = parseSpeakers(ev);
  const tags = parseTags(ev);
  const descId = `desc-${idx}`;
  const descFull = `desc-full-${idx}`;
  const previewWords = 60;
  const words = (ev.description || '').split(/\s+/);
  const isLong = words.length > previewWords;
  const preview = words.slice(0, previewWords).join(' ') + (isLong ? '…' : '');

  return `
    <div class="event-single" data-event-theme="${ev.colorTag || 'oneiro-dark'}">
      ${renderImage(ev.imageUrl, 'event-image')}
      <div class="event-meta">${eventBadges(ev)}</div>
      ${tags.length ? `<div class="tag-pills-row">${renderTagPills(tags)}</div>` : ''}
      <h2>${ev.title}</h2>
      ${isLong ? `
        <p class="desc-preview" id="${descId}">${preview}</p>
        <div class="collapsible-body" id="${descFull}">
          <p class="desc-full">${ev.description}</p>
        </div>
        <button class="collapsible-trigger" onclick="toggleDesc(this,'${descId}','${descFull}')">
          <span class="btn-label">Preberi več</span><span class="chevron">▾</span>
        </button>` : `<p class="desc-preview">${ev.description || ''}</p>`}
      ${ev.locationUrl ? `<a class="location-link" href="${ev.locationUrl}" target="_blank" rel="noopener">↗ ${ev.isOnline === 'true' ? 'Pridruži se online' : 'Odpri lokacijo'}</a>` : ''}
      ${speakerListHtml(speakers)}
    </div>`;
}

async function init() {
  try {
    const data = await fetchPublicData();
    const { events = [], settings = {}, teamMembers = [] } = data;

    // Apply settings
    const title = settings.siteTitle || 'Events';
    document.title = title;
    document.getElementById('site-title').textContent = title;
    document.getElementById('nav-title').textContent = title;
    document.querySelector('meta[property="og:title"]').setAttribute('content', title);
    document.querySelector('meta[name="twitter:title"]').setAttribute('content', title);

    if (settings.siteSubtitle) {
      document.getElementById('site-subtitle').textContent = settings.siteSubtitle;
      document.querySelector('meta[property="og:description"]').setAttribute('content', settings.siteSubtitle);
    }
    if (settings.footerText) document.getElementById('footer-text').textContent = settings.footerText;
    if (settings.heroText) {
      document.getElementById('hero-text').textContent = settings.heroText;
      document.getElementById('hero-section').style.display = '';
    }

    collectName = settings.collectName === 'true';
    if (collectName) document.getElementById('subscribe-bar').classList.add('show-name');

    const upcoming = events
      .filter(e => e.published === 'true' && isUpcoming(e.date))
      .sort((a, b) => (a.date || '').localeCompare(b.date || ''))
      .slice(0, PREVIEW_LENGTH);

    const totalUpcoming = events.filter(e => e.published === 'true' && isUpcoming(e.date)).length;

    // Remove skeleton
    document.getElementById('skeleton-wrap')?.remove();

    const main = document.getElementById('main');
    if (!upcoming.length) {
      main.innerHTML = `<div class="empty-state"><div class="symbol">☽</div><p>Ni napovedanih prihodnjih dogodkov.</p></div>`;
    } else {
      main.innerHTML = upcoming.map((ev, i) => eventHtml(ev, i)).join('');
    }

    // Show CTA if there are more events
    if (totalUpcoming > PREVIEW_LENGTH) {
      document.getElementById('cta-more').style.display = '';
    }

  } catch (e) {
    document.getElementById('skeleton-wrap')?.remove();
    document.getElementById('main').innerHTML = `<div class="empty-state"><div class="symbol">!</div><p>Napaka pri nalaganju.</p></div>`;
  }
}

// Subscribe — uses shared handler but needs local msg element
async function handleSubscribe(e) {
  e.preventDefault();
  const btn = e.target.querySelector('[type=submit]');
  const msg = document.getElementById('sub-msg-bar');
  const email = e.target.querySelector('.sub-email').value.trim();
  const name = e.target.querySelector('.sub-name')?.value?.trim() || '';
  btn.disabled = true;
  msg.style.display = 'none';
  try {
    const res = await fetch(`${API}/subscribe`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name })
    });
    const data = await res.json();
    msg.style.display = 'block';
    msg.className = 'bar-msg ' + (data.ok ? 'ok' : 'error');
    msg.textContent = data.ok ? '✦ Prijava uspešna.' : (data.error || 'Napaka.');
    if (data.ok) e.target.reset();
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  } catch { msg.style.display = 'block'; msg.className = 'bar-msg error'; msg.textContent = 'Napaka pri povezavi.'; }
  finally { btn.disabled = false; }
}

initNav();
initBackToTop();
init();
</script>
</body>
</html>
