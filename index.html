<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events</title>
<script defer src="/_vercel/insights/script.js"></script>
<style>
:root {
  --bg: #0a0a12;
  --bg2: #10101e;
  --bg3: #16162a;
  --card: #1a1a2e;
  --border: rgba(120,100,255,0.18);
  --accent: #7c6dfa;
  --accent2: #c4a44a;
  --text: #e8e4ff;
  --text2: #9d97c8;
  --text3: #5e5a8a;
  --radius: 14px;
  --font: 'Georgia', 'Times New Roman', serif;
  --sans: system-ui, -apple-system, sans-serif;
}

/* Theme tokens — can be applied globally (html) OR scoped to a single card via [data-event-theme] */
[data-theme="forest-dream"], [data-event-theme="forest-dream"] {
  --bg: #080e0a; --bg2: #0d1510; --bg3: #111d14;
  --card: #152019; --border: rgba(80,180,120,0.18);
  --accent: #52b478; --accent2: #e8a97a;
  --text: #e0f0e8; --text2: #8ab89a; --text3: #4a7058;
}
[data-theme="ember-trance"], [data-event-theme="ember-trance"] {
  --bg: #100807; --bg2: #1a0e09; --bg3: #221410;
  --card: #2a1a12; --border: rgba(200,90,40,0.2);
  --accent: #d4622a; --accent2: #e8c06a;
  --text: #f0e0d0; --text2: #b08070; --text3: #705040;
}
[data-theme="void"], [data-event-theme="void"] {
  --bg: #000; --bg2: #080808; --bg3: #111;
  --card: #161616; --border: rgba(160,140,255,0.15);
  --accent: #9080e8; --accent2: #c0c0c0;
  --text: #e0e0e8; --text2: #808090; --text3: #404050;
}
[data-event-theme="oneiro-dark"] {
  --bg: #0a0a12; --bg2: #10101e; --bg3: #16162a;
  --card: #1a1a2e; --border: rgba(120,100,255,0.18);
  --accent: #7c6dfa; --accent2: #c4a44a;
  --text: #e8e4ff; --text2: #9d97c8; --text3: #5e5a8a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

/* ── NOISE TEXTURE ── */
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.4;
}

.wrap { position: relative; z-index: 1; padding-bottom: 90px; /* space for sticky subscribe bar */ }

/* ── HEADER ── */
header {
  position: relative;
  text-align: center;
  padding: 4rem 1.5rem 2rem;
  border-bottom: 1px solid var(--border);
}
header h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 400;
  letter-spacing: 0.04em;
  color: var(--text);
  line-height: 1.15;
}
header p {
  margin-top: 0.75rem;
  font-size: 1.05rem;
  color: var(--text2);
  font-style: italic;
}
.header-star {
  display: block;
  font-size: 1.4rem;
  color: var(--accent2);
  margin-bottom: 1rem;
  letter-spacing: 0.6em;
}

/* Discreet but findable admin link — top-right corner */
.admin-link {
  position: absolute;
  top: 1rem; right: 1rem;
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  text-decoration: none;
  font-size: 1rem;
  opacity: 0.7;
  transition: opacity 0.2s, border-color 0.2s, color 0.2s;
}
.admin-link:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════
   SINGLE MODE — stacked, all upcoming events one after another
═══════════════════════════════════════ */
.mode-single .event-single {
  max-width: 680px;
  margin: 3rem auto;
  padding: 0 1.5rem;
}
.mode-single .event-single + .event-single {
  margin-top: 0;
  padding-top: 3rem;
  border-top: 1px solid var(--border);
}
.event-image {
  width: 100%;
  max-height: 65vh;
  object-fit: contain;
  background: var(--bg3);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  display: block;
  margin-bottom: 2rem;
}
.event-image.placeholder {
  background: linear-gradient(135deg, var(--bg3) 0%, var(--card) 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem;
  color: var(--text3);
  height: 340px;
}
.event-meta {
  display: flex; flex-wrap: wrap; gap: 0.75rem;
  margin-bottom: 1.5rem;
}
.badge {
  font-family: var(--sans);
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  padding: 0.3em 0.8em;
  border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--text2);
  background: var(--bg3);
}
.badge.online { color: var(--accent); border-color: var(--accent); }
.badge.recurring { color: var(--accent2); border-color: var(--accent2); }
.badge.past { opacity: 0.6; }
.mode-single h2 {
  font-size: clamp(1.6rem, 4vw, 2.4rem);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 1.25rem;
  color: var(--text);
}
.desc {
  font-size: 1.05rem;
  line-height: 1.75;
  color: var(--text2);
  white-space: pre-line;
}
.location-link {
  display: inline-flex; align-items: center; gap: 0.4rem;
  margin-top: 1.5rem;
  color: var(--accent);
  font-family: var(--sans);
  font-size: 0.9rem;
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}
.location-link:hover { border-color: var(--accent); }

/* ═══════════════════════════════════════
   CATALOG MODE
═══════════════════════════════════════ */
.mode-catalog .events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.5rem;
  max-width: 1100px;
  margin: 2.5rem auto;
  padding: 0 1.5rem;
}
.event-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s;
  cursor: pointer;
}
.event-card:hover {
  transform: translateY(-3px);
  border-color: var(--accent);
}
.event-card.is-past { opacity: 0.55; }
.event-card .card-img {
  width: 100%; aspect-ratio: 16/9; object-fit: cover;
  display: block;
}
.event-card .card-img.placeholder {
  background: var(--bg3);
  height: 160px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; color: var(--text3);
}
.event-card .card-body { padding: 1.25rem; }
.event-card .card-meta {
  font-family: var(--sans);
  font-size: 0.78rem;
  color: var(--text3);
  letter-spacing: 0.04em;
  margin-bottom: 0.6rem;
  text-transform: uppercase;
  display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
}
.event-card h3 {
  font-size: 1.15rem;
  font-weight: 400;
  color: var(--text);
  margin-bottom: 0.6rem;
  line-height: 1.3;
}
.event-card .card-desc {
  font-size: 0.9rem;
  color: var(--text2);
  line-height: 1.6;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.mini-tag {
  display: inline-block; width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent);
}

/* Section headers within catalog/series (upcoming vs past) */
.section-divider {
  max-width: 1100px;
  margin: 2.5rem auto 0;
  padding: 0 1.5rem;
}
.section-divider h2 {
  font-size: 1rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text3);
  font-family: var(--sans);
  padding-bottom: 0.75rem;
  border-bottom: 1px solid var(--border);
}

/* ═══════════════════════════════════════
   SERIES MODE (timeline)
═══════════════════════════════════════ */
.mode-series .timeline {
  max-width: 720px;
  margin: 2.5rem auto;
  padding: 0 1.5rem;
  position: relative;
}
.mode-series .timeline::before {
  content: '';
  position: absolute;
  left: calc(1.5rem + 20px);
  top: 0; bottom: 0;
  width: 1px;
  background: var(--border);
}
.timeline-item {
  display: flex;
  gap: 1.5rem;
  margin-bottom: 2.5rem;
  position: relative;
  cursor: pointer;
}
.timeline-item.is-past { opacity: 0.55; }
.timeline-dot {
  flex-shrink: 0;
  width: 41px; height: 41px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--sans);
  font-size: 0.7rem;
  color: var(--accent2);
  letter-spacing: 0.02em;
  position: relative; z-index: 1;
}
.timeline-dot.future { border-color: var(--accent); color: var(--accent); }
.timeline-body {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.25rem;
  margin-top: 0.3rem;
  transition: border-color 0.2s;
}
.timeline-item:hover .timeline-body { border-color: var(--accent); }
.timeline-body h3 { font-size: 1.1rem; font-weight: 400; margin-bottom: 0.4rem; }
.timeline-body .tl-meta {
  font-family: var(--sans); font-size: 0.8rem; color: var(--text3);
  margin-bottom: 0.6rem;
}
.timeline-body .tl-desc {
  font-size: 0.9rem; color: var(--text2); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ═══════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════ */
.empty-state {
  text-align: center;
  padding: 5rem 1.5rem;
}
.empty-state .symbol { font-size: 3rem; color: var(--text3); margin-bottom: 1rem; }
.empty-state p { color: var(--text3); font-style: italic; }

/* ═══════════════════════════════════════
   MODAL — event detail popup
═══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(3px);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding: 5vh 1.5rem;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal-box {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  max-width: 640px;
  width: 100%;
  position: relative;
  animation: modalIn 0.2s ease-out;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
.modal-close {
  position: absolute;
  top: 0.8rem; right: 0.8rem;
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 1.1rem;
  z-index: 2;
}
.modal-close:hover { color: var(--text); border-color: var(--accent); }
.modal-content { padding: 1.5rem; }
.modal-content .event-image { margin-bottom: 1.5rem; }

/* ═══════════════════════════════════════
   SUBSCRIBE — sticky bottom bar
═══════════════════════════════════════ */
.subscribe-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  padding: 0.8rem 1.5rem;
}
.subscribe-bar-inner {
  max-width: 680px;
  margin: 0 auto;
  display: flex;
  gap: 0.6rem;
  align-items: center;
  position: relative;
}
.subscribe-bar input {
  flex: 1;
  min-width: 0;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 0.9rem;
  color: var(--text);
  font-family: var(--sans);
  font-size: 0.9rem;
  outline: none;
}
.subscribe-bar input::placeholder { color: var(--text3); }
.subscribe-bar input:focus { border-color: var(--accent); }
.subscribe-bar button {
  flex-shrink: 0;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0.65rem 1.2rem;
  font-family: var(--sans);
  font-size: 0.88rem;
  cursor: pointer;
  white-space: nowrap;
}
.subscribe-bar button:hover { opacity: 0.88; }
.subscribe-bar button:disabled { opacity: 0.5; cursor: not-allowed; }
.subscribe-bar .name-field { display: none; max-width: 140px; }
.subscribe-bar.show-name .name-field { display: block; }
.bar-msg {
  position: absolute;
  bottom: 100%; left: 0; right: 0;
  text-align: center;
  font-family: var(--sans);
  font-size: 0.82rem;
  padding: 0.4rem;
  background: var(--bg2);
}
.bar-msg.ok { color: var(--accent2); }
.bar-msg.error { color: #e06060; }

/* ── BACK TO TOP ── */
.back-to-top {
  position: fixed;
  bottom: 6rem; right: 1.2rem;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text2);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 1rem; z-index: 99;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, border-color 0.2s, color 0.2s;
}
.back-to-top.visible { opacity: 0.8; pointer-events: auto; }
.back-to-top:hover { opacity: 1; border-color: var(--accent); color: var(--accent); }

/* ── LOADER ── */
.loader {
  display: flex; align-items: center; justify-content: center;
  min-height: 40vh;
  color: var(--text3);
  font-style: italic;
  font-size: 1rem;
}

/* ═══════════════════════════════════════
   HERO SECTION
═══════════════════════════════════════ */
.hero-section {
  max-width: 680px;
  margin: 3rem auto 0;
  padding: 0 1.5rem;
}
.hero-inner {
  background: rgba(255,255,255,0.025);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent2);
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 1.6rem 2rem;
  position: relative;
}
.hero-inner::before {
  content: '✦';
  position: absolute;
  top: -0.7rem;
  left: 1.5rem;
  font-size: 0.75rem;
  color: var(--accent2);
  background: var(--bg);
  padding: 0 0.4rem;
}
.hero-inner p {
  font-size: 1.05rem;
  line-height: 1.85;
  color: var(--text2);
  white-space: pre-line;
  margin: 0;
}
.hero-divider {
  width: 40px; height: 1px;
  background: var(--border);
  margin: 2.5rem auto;
}

/* ── FILTER TABS ── */
.filter-tabs {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
  padding: 1.5rem 1.5rem 0;
  max-width: 1100px;
  margin: 0 auto;
}
.filter-tab {
  font-family: var(--sans);
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  padding: 0.4em 1em;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text3);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-tab:hover { color: var(--text2); border-color: var(--text3); }
.filter-tab.active { background: var(--card); color: var(--accent2); border-color: var(--accent2); }

/* ── LOAD MORE ── */
.load-more-wrap {
  text-align: center;
  padding: 1.5rem;
}
.load-more-btn {
  font-family: var(--sans);
  font-size: 0.88rem;
  color: var(--text2);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.65rem 1.5rem;
  cursor: pointer;
  transition: all 0.15s;
}
.load-more-btn:hover { border-color: var(--accent); color: var(--accent); }

/* ═══════════════════════════════════════
   TEAM SECTION
═══════════════════════════════════════ */
.team-section {
  max-width: 860px;
  margin: 0 auto 1rem;
  padding: 0 1.5rem;
}
.team-section h2 {
  font-size: 0.85rem;
  font-family: var(--sans);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-align: center;
  margin-bottom: 2rem;
}
.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.2rem;
}
.team-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1.5rem 1.2rem;
  text-align: center;
  transition: border-color 0.2s;
}
.team-card:hover { border-color: var(--accent); }
.team-card .member-img {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  margin: 0 auto 1rem;
  display: block;
  border: 2px solid var(--border);
}
.team-card .member-img.placeholder {
  background: var(--bg3);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; color: var(--text3);
  width: 72px; height: 72px; border-radius: 50%; margin: 0 auto 1rem;
}
.team-card .member-name {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 0.2rem;
}
.team-card .member-role {
  font-size: 0.78rem;
  font-family: var(--sans);
  color: var(--accent2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 0.8rem;
}
.team-card .member-bio {
  font-size: 0.88rem;
  line-height: 1.6;
  color: var(--text2);
  margin-bottom: 1rem;
}
.team-card .member-link {
  font-family: var(--sans);
  font-size: 0.82rem;
  color: var(--accent);
  text-decoration: none;
  border-bottom: 1px solid transparent;
  transition: border-color 0.2s;
}
.team-card .member-link:hover { border-color: var(--accent); }

/* ── FOOTER — fix: must clear sticky subscribe bar ── */
.site-footer {
  padding: 2rem 1.5rem 1.5rem;
  text-align: center;
  font-family: var(--sans);
  font-size: 0.8rem;
  color: var(--text3);
  border-top: 1px solid var(--border);
  margin-top: 3rem;
}

@media (max-width: 600px) {
  header { padding: 2.5rem 1rem 1.5rem; }
  .mode-single .event-single { margin: 1.5rem auto; }
  .mode-series .timeline::before { left: calc(1rem + 20px); }
  .subscribe-bar-inner { flex-wrap: wrap; }
  .subscribe-bar .name-field { max-width: none; flex: 1 1 100%; order: -1; }
  .team-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/admin.html" class="admin-link" title="Admin">⬡</a>
    <span class="header-star" id="header-star">✦ ✦ ✦</span>
    <h1 id="site-title">Events</h1>
    <p id="site-subtitle"></p>
  </header>

  <!-- Hero text (only shown if heroText is set in settings) -->
  <div class="hero-section" id="hero-section" style="display:none">
    <div class="hero-inner">
      <p id="hero-text"></p>
    </div>
  </div>

  <!-- Team section (only shown if team members exist) -->
  <div id="team-section" style="display:none">
    <div class="hero-divider"></div>
    <div class="team-section">
      <h2>Ekipa</h2>
      <div class="team-grid" id="team-grid"></div>
    </div>
    <div class="hero-divider"></div>
  </div>

  <!-- Filter tabs — shown after hero/team -->
  <div id="filter-tabs-wrap" style="display:none">
    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="upcoming" onclick="setFilter('upcoming')">Prihajajoči</button>
      <button class="filter-tab" data-filter="past" onclick="setFilter('past')">Pretekli</button>
      <button class="filter-tab" data-filter="all" onclick="setFilter('all')">Vsi</button>
    </div>
  </div>

  <main id="main">
    <div class="loader">Nalaganje...</div>
  </main>

  <footer class="site-footer">
    <p id="footer-text"></p>
  </footer>
</div>

<!-- BACK TO TOP -->
<button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Na vrh">↑</button>

<!-- MODAL for event details (catalog/series click) -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this) closeModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()" aria-label="Zapri">✕</button>
    <div class="modal-content" id="modal-content"></div>
  </div>
</div>

<!-- STICKY SUBSCRIBE BAR -->
<div class="subscribe-bar" id="subscribe-bar">
  <form class="subscribe-bar-inner" id="subscribe-form" onsubmit="handleSubscribe(event)">
    <div class="bar-msg" id="sub-msg" style="display:none"></div>
    <input type="text" id="sub-name" class="name-field" placeholder="Ime">
    <input type="email" id="sub-email" placeholder="E-mail za vabila na dogodke" required autocomplete="email">
    <button type="submit" id="sub-btn">Prijavi se</button>
  </form>
</div>

<script>
const API = '/api';
let allEvents = [];
let currentFilter = 'upcoming'; // 'upcoming' | 'past' | 'all'
const PAGE_SIZE = 6; // events per load-more batch
let visibleCount = PAGE_SIZE;

function formatDate(dateStr) {
  if (!dateStr) return '';
  try {
    return new Intl.DateTimeFormat('sl-SI', { weekday:'long', day:'numeric', month:'long', year:'numeric' }).format(new Date(dateStr));
  } catch { return dateStr; }
}
function formatDateShort(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    return d.toLocaleDateString('sl-SI', { day:'2-digit', month:'short' });
  } catch { return dateStr; }
}
function isUpcoming(dateStr) {
  if (!dateStr) return true;
  const d = new Date(dateStr);
  const today = new Date(); today.setHours(0,0,0,0);
  return d >= today;
}

function renderImage(imageUrl, cls = '') {
  if (imageUrl) return `<img src="${imageUrl}" class="${cls}" alt="Slika dogodka" loading="lazy" onerror="this.outerHTML='<div class=&quot;${cls} placeholder&quot;>☽</div>'">`;
  return `<div class="${cls} placeholder">☽</div>`;
}

function eventBadges(ev, includePast) {
  const badges = [];
  if (ev.date) badges.push(`<span class="badge${includePast && !isUpcoming(ev.date) ? ' past' : ''}">${formatDate(ev.date)}${ev.time ? ' · ' + ev.time : ''}</span>`);
  if (ev.isOnline === 'true') badges.push(`<span class="badge online">🔗 Online</span>`);
  else if (ev.location) badges.push(`<span class="badge">📍 ${ev.location}</span>`);
  if (ev.eventType === 'recurring') badges.push(`<span class="badge recurring">↻ Serija</span>`);
  return badges.join('');
}

function parseSpeakers(ev) {
  const v = ev.speakers;
  if (!v) return [];
  if (Array.isArray(v)) return v;
  if (typeof v === 'object' && v !== null) return Object.values(v);
  try { return JSON.parse(v); } catch { return []; }
}

function speakerCardHtml(s) {
  return `
    <div style="display:flex; gap:1rem; align-items:flex-start; margin-top:1.2rem">
      ${s.imageUrl
        ? `<img src="${s.imageUrl}" alt="${s.name}" style="width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--border)" onerror="this.style.display='none'">`
        : '<div style="width:52px;height:52px;border-radius:50%;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:1.2rem">☽</div>'
      }
      <div>
        <div style="font-size:0.95rem;color:var(--text)">${s.name}</div>
        ${s.role ? `<div style="font-size:0.78rem;color:var(--accent2);font-family:var(--sans);margin-bottom:0.3rem">${s.role}</div>` : ''}
        ${s.bio ? `<p style="font-size:0.86rem;color:var(--text2);line-height:1.6;margin:0">${s.bio}</p>` : ''}
        ${s.link ? `<a href="${s.link}" target="_blank" rel="noopener" style="font-size:0.8rem;color:var(--accent);text-decoration:none;font-family:var(--sans);display:inline-flex;align-items:center;gap:3px;margin-top:0.3rem"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Spletna stran</a>` : ''}
      </div>
    </div>`;
}

function eventDetailHtml(ev) {
  const speakers = parseSpeakers(ev);
  const speakersHtml = speakers.length ? `
    <div style="margin-top:1.8rem; padding-top:1.5rem; border-top:1px solid var(--border)">
      <div style="font-size:0.78rem;font-family:var(--sans);text-transform:uppercase;letter-spacing:0.06em;color:var(--text3);margin-bottom:0.6rem">${speakers.length === 1 ? 'Predavatelj' : 'Predavatelji'}</div>
      ${speakers.map(speakerCardHtml).join('')}
    </div>` : '';

  return `
    ${renderImage(ev.imageUrl, 'event-image')}
    <div class="event-meta">${eventBadges(ev, false)}</div>
    <h2>${ev.title}</h2>
    <div class="desc">${ev.description || ''}</div>
    ${ev.locationUrl ? `<a class="location-link" href="${ev.locationUrl}" target="_blank" rel="noopener">↗ ${ev.isOnline === 'true' ? 'Pridruži se online' : 'Odpri lokacijo'}</a>` : ''}
    ${speakersHtml}
  `;
}

function openModal(eventId) {
  const ev = allEvents.find(e => e.id === eventId);
  if (!ev) return;
  document.getElementById('modal-content').innerHTML = eventDetailHtml(ev);
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

/* ── SINGLE MODE: stack all upcoming, then past ── */
function renderSingle(upcoming, past) {
  if (!upcoming.length && !past.length) {
    return `<div class="empty-state"><div class="symbol">☽</div><p>Trenutno ni aktivnih dogodkov.</p></div>`;
  }
  let html = '';
  if (upcoming.length) {
    if (past.length) html += `<div class="section-divider" style="max-width:680px"><h2>Aktualni dogodki</h2></div>`;
    html += upcoming.map(ev => `<div class="event-single" data-event-theme="${ev.colorTag || 'oneiro-dark'}">${eventDetailHtml(ev)}</div>`).join('');
  } else {
    html += `<div class="empty-state"><div class="symbol">☽</div><p>Ni napovedanih prihodnjih dogodkov.</p></div>`;
  }
  if (past.length) {
    html += `<div class="section-divider" style="max-width:680px"><h2>Pretekli dogodki</h2></div>`;
    html += past.map(ev => `<div class="event-single" data-event-theme="${ev.colorTag || 'oneiro-dark'}" style="opacity:0.6">${eventDetailHtml(ev)}</div>`).join('');
  }
  return html;
}

/* ── CATALOG MODE: grid, upcoming then past section ── */
function renderCatalogGroup(events, isPast) {
  return `<div class="events-grid">${events.map(ev => `
    <article class="event-card${isPast ? ' is-past' : ''}" data-event-theme="${ev.colorTag || 'oneiro-dark'}" onclick="openModal('${ev.id}')">
      ${renderImage(ev.imageUrl, 'card-img')}
      <div class="card-body">
        <div class="card-meta"><span class="mini-tag"></span>${ev.date ? formatDate(ev.date) : ''}${ev.time ? ' · ' + ev.time : ''}${ev.eventType === 'recurring' ? ' · ↻ Serija' : ''}</div>
        <h3>${ev.title}</h3>
        <p class="card-desc">${ev.description || ''}</p>
      </div>
    </article>`).join('')}</div>`;
}
function renderCatalog(upcoming, past) {
  if (!upcoming.length && !past.length) return `<div class="empty-state"><div class="symbol">☽</div><p>Ni objavljenih dogodkov.</p></div>`;
  let html = '';
  if (upcoming.length) {
    if (past.length) html += `<div class="section-divider"><h2>Aktualni dogodki</h2></div>`;
    html += renderCatalogGroup(upcoming, false);
  } else {
    html += `<div class="empty-state"><div class="symbol">☽</div><p>Ni napovedanih prihodnjih dogodkov.</p></div>`;
  }
  if (past.length) {
    html += `<div class="section-divider"><h2>Pretekli dogodki</h2></div>`;
    html += renderCatalogGroup(past, true);
  }
  return html;
}

/* ── SERIES MODE: timeline, upcoming then past ── */
function renderSeriesGroup(events, isPast) {
  return `<div class="timeline">${events.map((ev, i) => `
    <div class="timeline-item${isPast ? ' is-past' : ''}" data-event-theme="${ev.colorTag || 'oneiro-dark'}" onclick="openModal('${ev.id}')">
      <div class="timeline-dot${!isPast ? ' future' : ''}">${ev.date ? formatDateShort(ev.date) : String(i+1).padStart(2,'0')}</div>
      <div class="timeline-body">
        <h3>${ev.title}</h3>
        <div class="tl-meta">${ev.date ? formatDate(ev.date) : ''}${ev.time ? ' · ' + ev.time : ''}${ev.location || ev.isOnline === 'true' ? ' · ' + (ev.isOnline === 'true' ? 'Online' : ev.location) : ''}${ev.eventType === 'recurring' ? ' · ↻ Serija' : ''}</div>
        <p class="tl-desc">${ev.description || ''}</p>
      </div>
    </div>`).join('')}</div>`;
}
function renderSeries(upcoming, past) {
  if (!upcoming.length && !past.length) return `<div class="empty-state"><div class="symbol">☽</div><p>Ni objavljenih dogodkov v seriji.</p></div>`;
  let html = '';
  if (upcoming.length) {
    if (past.length) html += `<div class="section-divider" style="max-width:720px"><h2>Aktualni dogodki</h2></div>`;
    html += renderSeriesGroup(upcoming, false);
  } else {
    html += `<div class="empty-state"><div class="symbol">☽</div><p>Ni napovedanih prihodnjih dogodkov.</p></div>`;
  }
  if (past.length) {
    html += `<div class="section-divider" style="max-width:720px"><h2>Pretekli dogodki</h2></div>`;
    html += renderSeriesGroup(past, true);
  }
  return html;
}

let displayMode = 'single';

async function init() {
  try {
    const res = await fetch(`${API}/events`);
    const data = await res.json();
    const { events = [], settings = {}, teamMembers = [] } = data;

    if (settings.siteTitle) {
      document.getElementById('site-title').textContent = settings.siteTitle;
      document.title = settings.siteTitle;
    }
    if (settings.siteSubtitle) document.getElementById('site-subtitle').textContent = settings.siteSubtitle;
    if (settings.footerText) document.getElementById('footer-text').textContent = settings.footerText;
    if (settings.collectName === 'true') document.getElementById('subscribe-bar').classList.add('show-name');

    if (settings.heroText) {
      document.getElementById('hero-text').textContent = settings.heroText;
      document.getElementById('hero-section').style.display = '';
    }

    if (teamMembers.length > 0) {
      document.getElementById('team-section').style.display = '';
      document.getElementById('team-grid').innerHTML = teamMembers.map(m => `
        <div class="team-card">
          ${m.imageUrl
            ? `<img class="member-img" src="${m.imageUrl}" alt="${m.name}" onerror="this.outerHTML='<div class=&quot;member-img placeholder&quot;>☽</div>'">`
            : '<div class="member-img placeholder">☽</div>'
          }
          <div class="member-name">${m.name}</div>
          ${m.role ? `<div class="member-role">${m.role}</div>` : ''}
          ${m.bio ? `<p class="member-bio">${m.bio}</p>` : ''}
          ${m.contact ? `<p style="font-family:var(--sans);font-size:0.82rem;color:var(--text3);margin-bottom:0.4rem">✉ ${m.contact}</p>` : ''}
          ${m.link ? `<a class="member-link" href="${m.link}" target="_blank" rel="noopener"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-1px;margin-right:3px"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>Spletna stran</a>` : ''}
        </div>
      `).join('');
    }

    const published = events.filter(e => e.published === 'true');
    allEvents = published;
    displayMode = settings.displayMode || 'single';
    document.getElementById('main').className = `mode-${displayMode}`;

    // Show filter tabs only when there's something to filter
    const hasPast = published.some(e => !isUpcoming(e.date));
    const hasUpcoming = published.some(e => isUpcoming(e.date));
    if (hasPast && hasUpcoming) {
      document.getElementById('filter-tabs-wrap').style.display = '';
    }

    renderMain();

  } catch (e) {
    document.getElementById('main').innerHTML = `<div class="empty-state"><div class="symbol">!</div><p>Napaka pri nalaganju.</p></div>`;
  }
}

function setFilter(filter) {
  currentFilter = filter;
  visibleCount = PAGE_SIZE;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.filter === filter));
  renderMain();
}

function getFilteredEvents() {
  if (currentFilter === 'upcoming') return { upcoming: allEvents.filter(e => isUpcoming(e.date)).sort((a, b) => (a.date||'').localeCompare(b.date||'')), past: [] };
  if (currentFilter === 'past') return { upcoming: [], past: allEvents.filter(e => !isUpcoming(e.date)).sort((a, b) => (b.date||'').localeCompare(a.date||'')) };
  // 'all'
  return {
    upcoming: allEvents.filter(e => isUpcoming(e.date)).sort((a, b) => (a.date||'').localeCompare(b.date||'')),
    past: allEvents.filter(e => !isUpcoming(e.date)).sort((a, b) => (b.date||'').localeCompare(a.date||''))
  };
}

function renderMain() {
  const main = document.getElementById('main');
  const { upcoming, past } = getFilteredEvents();
  const total = upcoming.length + past.length;

  // Apply load-more: for single mode show all (they're stacked naturally);
  // for catalog/series limit by visibleCount across combined upcoming+past.
  let upcomingSlice = upcoming;
  let pastSlice = past;
  let showLoadMore = false;

  if (displayMode !== 'single') {
    const combined = [...upcoming, ...past];
    const visible = combined.slice(0, visibleCount);
    upcomingSlice = visible.filter(e => isUpcoming(e.date));
    pastSlice = visible.filter(e => !isUpcoming(e.date));
    showLoadMore = total > visibleCount;
  }

  if (displayMode === 'single') main.innerHTML = renderSingle(upcomingSlice, pastSlice);
  else if (displayMode === 'catalog') main.innerHTML = renderCatalog(upcomingSlice, pastSlice);
  else if (displayMode === 'series') main.innerHTML = renderSeries(upcomingSlice, pastSlice);

  if (showLoadMore) {
    const btn = document.createElement('div');
    btn.className = 'load-more-wrap';
    btn.innerHTML = `<button class="load-more-btn" onclick="loadMore()">Prikaži več (${total - visibleCount} preostankov)</button>`;
    main.appendChild(btn);
  }
}

function loadMore() {
  visibleCount += PAGE_SIZE;
  renderMain();
}

async function handleSubscribe(e) {
  e.preventDefault();
  const btn = document.getElementById('sub-btn');
  const msg = document.getElementById('sub-msg');
  const email = document.getElementById('sub-email').value.trim();
  const name = document.getElementById('sub-name').value.trim();
  btn.disabled = true;
  msg.style.display = 'none';

  try {
    const res = await fetch(`${API}/subscribe`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, name })
    });
    const data = await res.json();
    msg.style.display = 'block';
    if (data.ok) {
      msg.className = 'bar-msg ok';
      msg.textContent = '✦ Prijava uspešna. Dobrodošel/a v skupnosti.';
      document.getElementById('subscribe-form').reset();
    } else {
      msg.className = 'bar-msg error';
      msg.textContent = data.error || 'Napaka. Poskusi znova.';
    }
  } catch {
    msg.style.display = 'block';
    msg.className = 'bar-msg error';
    msg.textContent = 'Napaka pri povezavi. Poskusi znova.';
  } finally {
    btn.disabled = false;
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  }
}

// Back to top visibility
window.addEventListener('scroll', () => {
  const btn = document.getElementById('back-to-top');
  if (btn) btn.classList.toggle('visible', window.scrollY > 400);
}, { passive: true });

init();
</script>
</body>
</html>
