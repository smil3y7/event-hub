<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ekipa</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="stylesheet" href="/_shared.css">
<meta property="og:type" content="website">
<meta property="og:title" content="Ekipa">
<meta property="og:description" content="">
<meta property="og:image" content="/og-image.svg">
<meta property="og:url" content="">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Ekipa">
<meta name="twitter:image" content="/og-image.svg">
<script defer src="/_vercel/insights/script.js"></script>
<style>
.team-grid-expanded {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1.2rem;
  max-width: 900px;
  margin: 2.5rem auto;
  padding: 0 1.5rem;
}

/* Collapsible team card */
.team-card-wrap { cursor: pointer; }
.team-card-wrap .team-card {
  transition: border-color 0.2s, transform 0.15s;
}
.team-card-wrap:hover .team-card { border-color: var(--accent); transform: translateY(-2px); }
.team-card-wrap.open .team-card { border-color: var(--accent2); transform: none; }

.team-card-header {
  display: flex; align-items: center; gap: 1rem;
  text-align: left;
}
.team-card-header .member-img,
.team-card-header .member-img.placeholder {
  margin: 0; flex-shrink: 0;
  width: 56px; height: 56px;
}
.team-card-header-text .member-name { font-size: 0.95rem; }
.team-card-header-text .member-role { margin-bottom: 0; }
.team-card-header .expand-icon {
  margin-left: auto; flex-shrink: 0;
  font-size: 0.75rem; color: var(--text3);
  transition: transform 0.2s;
}
.team-card-wrap.open .expand-icon { transform: rotate(180deg); }

.team-card-body {
  overflow: hidden; max-height: 0; opacity: 0;
  transition: max-height 0.35s ease-out, opacity 0.2s;
}
.team-card-body.open {
  max-height: 1200px; opacity: 1;
  transition: max-height 0.4s ease-in, opacity 0.25s 0.05s;
}
.team-card-body-inner {
  padding-top: 1rem;
  border-top: 1px solid var(--border);
  margin-top: 1rem;
}
.member-bio-full {
  font-size: 0.88rem; line-height: 1.7; color: var(--text2);
  margin-bottom: 0.8rem; white-space: pre-line;
}
.member-contact {
  font-family: var(--sans); font-size: 0.82rem; color: var(--text3);
  margin-bottom: 0.5rem;
}
.member-link-full {
  font-family: var(--sans); font-size: 0.82rem; color: var(--accent);
  text-decoration: none; display: inline-flex; align-items: center; gap: 3px;
}
.member-link-full:hover { text-decoration: underline; }
</style>
</head>
<body>

<nav class="site-nav">
  <div class="site-nav-inner">
    <a href="/" class="site-nav-logo">✦ <span id="nav-title">Events</span></a>
    <div class="site-nav-links">
      <a href="/" class="nav-link">Domov</a>
      <a href="/events.html" class="nav-link">Dogodki</a>
      <a href="/team.html" class="nav-link">Ekipa</a>
      <a href="/admin.html" class="nav-admin" title="Admin">⬡</a>
    </div>
  </div>
</nav>

<div class="wrap">
  <header class="site-header">
    <span class="header-star">✦ ✦ ✦</span>
    <h1>Ekipa</h1>
    <p id="site-subtitle"></p>
  </header>

  <div id="main">
    <!-- Skeleton -->
    <div class="team-grid-expanded" id="skeleton-wrap">
      ${[1,2,3].map(() => `
        <div class="team-card">
          <div style="display:flex;align-items:center;gap:1rem">
            <div class="skel" style="width:56px;height:56px;border-radius:50%;flex-shrink:0"></div>
            <div style="flex:1">
              <div class="skel" style="height:14px;width:70%;margin-bottom:8px;border-radius:4px"></div>
              <div class="skel" style="height:10px;width:45%;border-radius:4px"></div>
            </div>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <footer class="site-footer">
    <p id="footer-text"></p>
    <p style="margin-top:0.5rem; opacity:0.5">&copy; <span id="footer-year"></span></p>
  </footer>
</div>

<button class="back-to-top" id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Na vrh">↑</button>

<div class="subscribe-bar" id="subscribe-bar">
  <form class="subscribe-bar-inner" onsubmit="handleSubscribe(event)">
    <div class="bar-msg" id="sub-msg-bar" style="display:none"></div>
    <input type="text" class="sub-name name-field" placeholder="Ime">
    <input type="email" class="sub-email" placeholder="E-mail za vabila na dogodke" required autocomplete="email">
    <button type="submit">Prijavi se</button>
  </form>
</div>

<script src="/_shared.js"></script>
<script>
const GLOBE_ICON = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:-1px;margin-right:3px"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

function toggleMember(wrap) {
  wrap.classList.toggle('open');
  wrap.querySelector('.team-card-body').classList.toggle('open');
}

function memberCardHtml(m, idx) {
  const hasDetail = m.bio || m.contact || m.link;
  return `
    <div class="team-card-wrap${hasDetail ? '' : ' no-detail'}" ${hasDetail ? `onclick="toggleMember(this)"` : ''} role="${hasDetail ? 'button' : 'article'}" tabindex="${hasDetail ? '0' : '-1'}" onkeydown="if(event.key==='Enter'||event.key===' ')toggleMember(this)">
      <div class="team-card">
        <div class="team-card-header">
          ${m.imageUrl
            ? `<img class="member-img" src="${m.imageUrl}" alt="${m.name}" onerror="this.outerHTML='<div class=&quot;member-img placeholder&quot;>☽</div>'">`
            : `<div class="member-img placeholder">☽</div>`}
          <div class="team-card-header-text">
            <div class="member-name">${m.name}</div>
            ${m.role ? `<div class="member-role">${m.role}</div>` : ''}
          </div>
          ${hasDetail ? `<span class="expand-icon">▾</span>` : ''}
        </div>
        ${hasDetail ? `
          <div class="team-card-body">
            <div class="team-card-body-inner">
              ${m.bio ? `<p class="member-bio-full">${m.bio}</p>` : ''}
              ${m.contact ? `<p class="member-contact">✉ ${m.contact}</p>` : ''}
              ${m.link ? `<a class="member-link-full" href="${m.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${GLOBE_ICON}Spletna stran</a>` : ''}
            </div>
          </div>` : ''}
      </div>
    </div>`;
}

async function handleSubscribe(e) {
  e.preventDefault();
  const btn = e.target.querySelector('[type=submit]');
  const msg = document.getElementById('sub-msg-bar');
  btn.disabled = true; msg.style.display = 'none';
  try {
    const res = await fetch(`${API}/subscribe`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: e.target.querySelector('.sub-email').value.trim(), name: e.target.querySelector('.sub-name')?.value?.trim() || '' })
    });
    const data = await res.json();
    msg.style.display = 'block'; msg.className = 'bar-msg ' + (data.ok ? 'ok' : 'error');
    msg.textContent = data.ok ? '✦ Prijava uspešna.' : (data.error || 'Napaka.');
    if (data.ok) e.target.reset();
    setTimeout(() => { msg.style.display = 'none'; }, 4000);
  } catch {
    msg.style.display = 'block'; msg.className = 'bar-msg error'; msg.textContent = 'Napaka pri povezavi.';
  } finally { btn.disabled = false; }
}

async function init() {
  try {
    const data = await fetchPublicData();
    const { settings = {}, teamMembers = [] } = data;

    const title = settings.siteTitle || 'Events';
    document.getElementById('nav-title').textContent = title;
    if (settings.siteSubtitle) document.getElementById('site-subtitle').textContent = settings.siteSubtitle;
    if (settings.footerText) document.getElementById('footer-text').textContent = settings.footerText;
    if (settings.collectName === 'true') document.getElementById('subscribe-bar').classList.add('show-name');

    document.getElementById('skeleton-wrap')?.remove();
    const main = document.getElementById('main');

    if (!teamMembers.length) {
      main.innerHTML = `<div class="empty-state"><div class="symbol">☽</div><p>Ekipa še ni predstavljena.</p></div>`;
      return;
    }

    main.innerHTML = `<div class="team-grid-expanded">${teamMembers.map((m, i) => memberCardHtml(m, i)).join('')}</div>`;
  } catch {
    document.getElementById('skeleton-wrap')?.remove();
    document.getElementById('main').innerHTML = `<div class="empty-state"><div class="symbol">!</div><p>Napaka pri nalaganju.</p></div>`;
  }
}

initNav();
initBackToTop();
init();
</script>
</body>
</html>
